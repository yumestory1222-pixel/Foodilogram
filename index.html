<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#4A8C5C"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Foodi Logram"/>
<title>🌿 Foodi Logram</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
body{background:#F7F9F4;color:#1E2D1F;display:flex;flex-direction:column;max-width:430px;margin:0 auto;height:100dvh}
button{font-family:inherit;cursor:pointer}
textarea,input{font-family:inherit}
:root{
  --green:#4A8C5C;--greenDk:#2F6640;--greenLt:#8FBF9A;
  --bg:#F7F9F4;--surface:#fff;--surface2:#EFF4EB;
  --border:#DDE8D5;--text:#1E2D1F;--textSub:#6B8A6D;--textMute:#9EB89F;
  --mint:#C8E6C9;--rec:#D94F3D;--white:#fff;
}
/* Header */
#header{background:#fff;border-bottom:1px solid var(--border);padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo-row{display:flex;align-items:center;gap:8px}
.logo-icon{width:34px;height:34px;border-radius:10px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-name{font-size:16px;font-weight:800;color:var(--green);line-height:1}
.logo-sub{font-size:9px;font-weight:600;color:var(--textMute);letter-spacing:2.5px;text-transform:uppercase}
.stats{display:flex;gap:14px;align-items:center}
.stat{text-align:center}
.stat-num{font-size:18px;font-weight:700;line-height:1}
.stat-lbl{font-size:9px;color:var(--textMute);margin-top:1px}
.stat-div{width:1px;height:24px;background:var(--border)}
/* Date strip */
#datestrip{background:var(--surface2);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;font-size:11px;color:var(--textSub)}
#clock{font-size:13px;font-weight:700;color:var(--green);letter-spacing:1px}
/* Content */
#content{flex:1;overflow-y:auto;display:flex;flex-direction:column}
/* Nav */
#nav{background:#fff;border-top:1px solid var(--border);display:flex;padding:8px 0 12px;flex-shrink:0;box-shadow:0 -4px 16px rgba(74,140,92,0.06)}
.nav-btn{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0}
.nav-icon{width:36px;height:36px;border-radius:12px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .18s}
.nav-icon.active{background:var(--green);box-shadow:0 3px 10px rgba(74,140,92,0.3)}
.nav-lbl{font-size:10px;color:var(--textMute)}
.nav-lbl.active{color:var(--green);font-weight:700}
/* Camera */
#cam-view{display:flex;flex-direction:column;flex:1}
#vf-wrap{position:relative;margin:14px;border-radius:20px;overflow:hidden;aspect-ratio:4/3;background:#111;box-shadow:0 8px 30px rgba(74,140,92,0.15);flex-shrink:0}
#cam-video{width:100%;height:100%;object-fit:cover;display:block}
#cam-error{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:0 24px;display:none}
.cam-error-emoji{font-size:52px}
.cam-error-title{font-size:14px;font-weight:700;color:var(--textSub);text-align:center}
.cam-error-msg{font-size:11px;color:var(--textMute);text-align:center;line-height:1.6}
#retry-btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:13px;font-weight:700}
#flash{position:absolute;inset:0;background:white;opacity:0;pointer-events:none;border-radius:20px;transition:opacity .1s}
#countdown-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);z-index:5}
#countdown-num{font-size:80px;font-weight:900;color:var(--green)}
#rec-badge{position:absolute;top:12px;left:14px;display:none;align-items:center;gap:6px;background:rgba(0,0,0,0.55);border-radius:20px;padding:4px 10px}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--rec);animation:pulse 1s infinite}
#rec-txt{font-size:11px;color:var(--rec);font-weight:700;letter-spacing:1px}
#ts-pill{position:absolute;bottom:12px;left:12px;background:rgba(30,45,31,0.6);border-radius:10px;padding:4px 10px;backdrop-filter:blur(4px)}
#ts-pill span{font-size:14px;font-weight:700;color:rgba(250,252,248,0.95)}
.corner{position:absolute;width:20px;height:20px}
.corner.tl{top:14px;left:14px;border-top:2px solid rgba(74,140,92,0.7);border-left:2px solid rgba(74,140,92,0.7)}
.corner.tr{top:14px;right:14px;border-top:2px solid rgba(74,140,92,0.7);border-right:2px solid rgba(74,140,92,0.7)}
.corner.bl{bottom:14px;left:14px;border-bottom:2px solid rgba(74,140,92,0.7);border-left:2px solid rgba(74,140,92,0.7)}
.corner.br{bottom:14px;right:14px;border-bottom:2px solid rgba(74,140,92,0.7);border-right:2px solid rgba(74,140,92,0.7)}
/* Mode bar */
.mode-bar{display:flex;margin:0 16px 12px;background:var(--surface2);border-radius:14px;padding:4px}
.mode-btn{flex:1;padding:9px 0;border:none;background:transparent;border-radius:10px;font-size:13px;color:var(--textSub);transition:all .18s}
.mode-btn.active{background:var(--green);color:#fff;font-weight:700}
/* Controls */
.controls{display:flex;align-items:center;justify-content:space-between;padding:0 20px 10px}
.timer-row{display:flex;align-items:center;gap:8px}
.timer-lbl{font-size:11px;color:var(--textSub);font-weight:500}
.timer-pills{display:flex;gap:6px}
.timer-pill{background:var(--surface2);border:none;border-radius:20px;padding:6px 14px;font-size:12px;color:var(--textSub);transition:all .18s}
.timer-pill.active{background:var(--green);color:#fff;font-weight:700}
.flip-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:6px 12px;font-size:16px;color:var(--textSub)}
/* Shutter */
.shutter-wrap{display:flex;justify-content:center;padding-bottom:24px;padding-top:6px}
.shutter{width:80px;height:80px;border-radius:50%;background:var(--green);border:3.5px solid #fff;box-shadow:0 6px 20px rgba(74,140,92,0.35);display:flex;align-items:center;justify-content:center;position:relative;padding:0;line-height:1;vertical-align:middle}
.shutter.rec-mode{background:var(--rec);box-shadow:0 6px 20px rgba(217,79,61,0.4)}
.shutter-inner{width:26px;height:26px;border-radius:50%;background:#fff;display:block;flex-shrink:0;margin:0}
.shutter-inner.vid{width:24px;height:24px;border-radius:50%}
.shutter-inner.stop{width:22px;height:22px;border-radius:4px}
/* Gallery */
#gallery-view{padding:16px;overflow-y:auto}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.toolbar-count{font-size:12px;color:var(--textMute)}
.del-btn{background:none;border:1.5px solid var(--border);border-radius:10px;padding:6px 14px;font-size:12px;color:var(--textSub)}
.cancel-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:6px 14px;font-size:12px;color:var(--textSub)}
.confirm-del-btn{background:#D94F3D;border:none;border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;color:#fff}
.confirm-del-btn:disabled{background:var(--surface2);color:var(--textMute)}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:13px;font-weight:600}
.sec-badge{font-size:11px;color:var(--green);font-weight:600}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:20px}
.cell{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;border:2.5px solid transparent;transition:all .15s;cursor:pointer}
.cell.sel{border-color:var(--green);box-shadow:0 0 0 2px rgba(74,140,92,0.25)}
.cell.del-sel{border-color:#D94F3D;opacity:0.65}
.cell img,.cell video{width:100%;height:100%;object-fit:cover;display:block}
.cell-grad{position:absolute;bottom:0;left:0;right:0;padding:14px 6px 5px;background:linear-gradient(transparent,rgba(0,0,0,0.5))}
.cell-time{font-size:9px;color:rgba(255,255,255,0.9);font-weight:700}
.cell-dur{font-size:9px;color:rgba(255,255,255,0.7)}
.play-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.2)}
.play-circle{width:28px;height:28px;border-radius:50%;background:rgba(74,140,92,0.8);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.sel-num{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700}
.chk{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.45);border:2px solid rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.chk.on{background:#D94F3D;border-color:#D94F3D}
.edit-btn{position:absolute;top:5px;left:5px;background:rgba(0,0,0,0.6);border:none;border-radius:8px;padding:3px 7px;color:#fff;font-size:11px;font-weight:700;letter-spacing:1px}
.ov-badge{position:absolute;top:5px;left:36px;background:rgba(74,140,92,0.85);border-radius:6px;padding:2px 6px;font-size:9px;color:#fff;font-weight:700}
.cta-wrap{display:flex;flex-direction:column;gap:10px}
.cta-green{background:var(--green);color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;box-shadow:0 4px 14px rgba(74,140,92,0.3);width:100%}
.cta-outline{background:#fff;color:var(--green);border:1.5px solid var(--green);border-radius:14px;padding:14px;font-size:14px;font-weight:700;width:100%}
.hint-txt{text-align:center;font-size:12px;color:var(--textMute);padding:10px 0}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:60px;text-align:center}
.empty-icon{width:64px;height:64px;border-radius:20px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:28px}
/* Collage */
#collage-view{padding:16px;overflow-y:auto}
.ratio-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.ratio-lbl{font-size:11px;color:var(--textSub);white-space:nowrap}
.ratio-btn{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:7px 0;font-size:12px;color:var(--textSub);transition:all .15s}
.ratio-btn.active{background:var(--green);border-color:var(--green);color:#fff;font-weight:700}
.layout-row{display:flex;gap:6px;margin-bottom:10px}
.layout-btn{flex:1;background:var(--surface2);border:none;border-radius:8px;padding:8px 4px;font-size:10px;color:var(--textSub);line-height:1.4;text-align:center}
.layout-btn.active{background:var(--green);color:#fff;font-weight:700}
.collage-canvas-wrap{border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(74,140,92,0.12)}
#collage-canvas{width:100%;display:block;border-radius:14px}
.save-share-bar{display:flex;gap:10px;margin-top:12px}
.save-btn2{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:13px 0;font-size:13px;font-weight:600;color:var(--text)}
.share-btn{flex:2;background:var(--green);border:none;border-radius:12px;padding:13px 0;font-size:14px;font-weight:700;color:#fff;box-shadow:0 4px 14px rgba(74,140,92,0.3)}
/* Video collage */
.vcollage-wrap{background:#0d0d0d;border-radius:18px;overflow:hidden;border:1px solid var(--border)}
.vcollage-grid{display:grid;gap:3px;padding:3px;width:100%;aspect-ratio:9/16;position:relative}
.vcell{position:relative;overflow:hidden;border-radius:8px;min-height:60px;transition:opacity .45s,transform .45s cubic-bezier(0.34,1.56,0.64,1)}
.vcell.hidden{opacity:0;transform:scale(0.88)}
.vcell video{width:100%;height:100%;object-fit:cover;display:block}
.vcell-ts{position:absolute;top:50%;left:8px;transform:translateY(-50%);background:rgba(15,30,15,0.6);border-radius:5px;padding:1px 5px;font-size:12px;font-weight:700;color:rgba(250,252,248,0.95);pointer-events:none}
.vcell-dur{position:absolute;top:5px;right:7px;font-size:9px;color:rgba(255,255,255,0.7);pointer-events:none}
.vcell-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.25)}
.vcell-play-btn{width:34px;height:34px;border-radius:50%;background:rgba(74,140,92,0.85);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.order-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:50%;background:rgba(74,140,92,0.93);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;z-index:10;animation:popIn .4s cubic-bezier(0.34,1.56,0.64,1)}
.vcollage-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#181818}
.vcollage-date{font-size:10px;color:#aaa}
.vcollage-badge{font-size:10px;color:var(--green);font-weight:700;background:rgba(74,140,92,0.15);border-radius:6px;padding:2px 7px}
.vcollage-info{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.vcollage-info-txt{font-size:11px;color:var(--textSub)}
.vcollage-hint{margin-top:12px;padding:10px 14px;background:var(--mint);border-radius:12px;font-size:11px;color:var(--greenDk);line-height:1.6}
/* Text editor modal */
#text-editor{position:fixed;inset:0;z-index:200;background:rgba(10,10,10,0.97);display:none;flex-direction:column;max-width:430px;margin:0 auto}
#text-editor.open{display:flex}
.ed-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid #222;flex-shrink:0}
.ed-close{background:none;border:none;color:#888;font-size:22px;line-height:1}
.ed-title{font-size:14px;font-weight:700;color:#fff}
.ed-save{background:var(--green);color:#fff;border:none;border-radius:10px;padding:7px 16px;font-size:13px;font-weight:700}
.ed-preview{position:relative;flex:1;background:#000;overflow:hidden}
.ed-preview img,.ed-preview video{width:100%;height:100%;object-fit:contain;display:block}
.ov-label{position:absolute;cursor:pointer;transform:translate(-50%,-50%);max-width:85%}
.ov-label span{display:inline-block;font-weight:700;text-shadow:0 1px 8px rgba(0,0,0,0.8);border:1.5px dashed transparent;border-radius:6px;padding:2px 6px;text-align:center;line-height:1.3}
.ov-label span.editing{border-color:var(--green)}
.tap-hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;pointer-events:none}
.tap-hint span{font-size:11px;color:rgba(255,255,255,0.6);background:rgba(0,0,0,0.5);border-radius:20px;padding:4px 12px}
.ed-controls{background:#111;border-top:1px solid #222;padding:12px 14px 20px;max-height:280px;overflow-y:auto;flex-shrink:0}
.ov-list{margin-bottom:12px}
.ov-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin-bottom:6px;border-radius:10px;background:#181818;border:1.5px solid #222;cursor:pointer}
.ov-item.active{background:#1e1e1e;border-color:var(--green)}
.ov-item-txt{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ov-item-btns{display:flex;gap:8px;margin-left:10px}
.ov-item-btns button{background:none;border:none;font-size:14px;cursor:pointer}
.add-txt-btn{width:100%;background:none;border:1.5px dashed rgba(74,140,92,0.3);border-radius:10px;padding:9px 0;color:var(--green);font-size:13px;font-weight:600;margin-bottom:14px}
.ed-panel{background:#181818;border-radius:12px;padding:12px 14px}
.panel-lbl{font-size:11px;color:#666;margin-bottom:6px;margin-top:10px}
.panel-lbl:first-child{margin-top:0}
.ed-textarea{width:100%;background:#222;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px;padding:8px 10px;resize:none;outline:none;min-height:52px;box-sizing:border-box}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:border .12s;flex-shrink:0}
.color-dot.active{border-color:var(--green)}
.size-row{display:flex;gap:6px}
.size-btn{flex:1;background:#222;color:#888;border:none;border-radius:8px;padding:6px 0;font-size:11px;cursor:pointer}
.size-btn.active{background:var(--green);color:#fff;font-weight:700}
.apply-btn{width:100%;margin-top:12px;background:var(--green);color:#fff;border:none;border-radius:10px;padding:10px 0;font-size:13px;font-weight:700}
.empty-ov-hint{text-align:center;color:#555;font-size:12px;padding:10px 0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}
@keyframes popIn{0%{opacity:0;transform:translate(-50%,-50%) scale(0.4)}60%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.native-btns{display:flex;gap:10px;margin:0 16px 16px}
.native-btn{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:12px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.native-btn:active{background:var(--surface2)}
.native-btn .nb-icon{font-size:24px}
.native-btn .nb-label{font-size:11px;color:var(--textSub);font-weight:600}
@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(20px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(20px)}}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:700;z-index:999;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(74,140,92,0.4);display:none}
#toast.show{display:block;animation:toastIn .3s ease forwards}
#toast.hide{animation:toastOut .3s ease forwards}
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="logo-row">
    <div class="logo-icon">🌿</div>
    <div>
      <div class="logo-name">foodi</div>
      <div class="logo-sub">logram</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="photo-count">0</div><div class="stat-lbl">사진</div></div>
    <div class="stat-div"></div>
    <div class="stat"><div class="stat-num" id="video-count">0</div><div class="stat-lbl">영상</div></div>
  </div>
</div>

<!-- Date strip -->
<div id="datestrip">
  <span id="date-txt">🌿 로딩중...</span>
  <span id="clock">00:00</span>
</div>

<!-- Content -->
<div id="content">

  <!-- Camera view — 웹캠 방식 -->
  <div id="cam-view" style="display:flex;flex-direction:column;flex:1">
    <div id="vf-wrap">
      <video id="cam-video" autoplay playsinline muted></video>
      <div id="cam-error">
        <div class="cam-error-emoji" style="animation:bounce 1.6s ease-in-out infinite">🥗</div>
        <div class="cam-error-title">카메라 권한이 필요해요</div>
        <div class="cam-error-msg">카메라와 마이크 접근을 허용해주세요</div>
        <button id="retry-btn" onclick="startCamera()">🔄 다시 시도</button>
      </div>
      <div id="flash"></div>
      <div id="countdown-overlay"><div id="countdown-num"></div></div>
      <div id="rec-badge"><div class="rec-dot"></div><span id="rec-txt">REC 00:00</span></div>
      <div id="ts-pill"><span id="vf-time">00:00 AM</span></div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
    <div class="mode-bar">
      <button class="mode-btn active" id="mode-photo" onclick="setMode('photo')">📷 사진</button>
      <button class="mode-btn" id="mode-video" onclick="setMode('video')">🎬 영상</button>
    </div>
    <div class="controls" id="cam-controls">
      <div class="timer-row" id="timer-row-video" style="display:none;flex-wrap:wrap;align-items:center;gap:8px">
        <span class="timer-lbl">🎬 촬영</span>
        <div class="timer-pills" id="video-timer-pills">
          <button class="timer-pill active" onclick="setTimer(3)">3초</button>

<script>
// ── State ─────────────────────────────────────────────────────
const state = {
  photos: [], videos: [],
  captureMode: 'photo', facingMode: 'environment',
  timerSec: 3, countdown: null, recording: false, recDur: 0,
  recTimer: null, stream: null, recorder: null, chunks: [],
  selPhotos: [], selVideos: [],
  deleteMode: false, delPhotos: [], delVideos: [],
  collageMode: 'photo', photoLayout: 'grid2x2', photoRatio: '1:1', videoLayout: '1x1', videoMaxClips: 1, videoRatio: '9:16',
  colPhotoIdx: null, colVideoIdx: null,
  editingType: null, editingIdx: null,
  edOverlays: [], editingOvId: null,
  edDraft: {text:'',x:50,y:50,color:'#ffffff',size:18},
  vcRevealTimer: null, vcRevealed: [], vcAllRevealed: false,
};

// ── Toast 메시지 ─────────────────────────────────────────────
function showToast(msg, emoji='✅'){
  const t=$('toast');
  t.textContent=`${emoji} ${msg}`;
  t.className='show';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{
    t.className='hide';
    setTimeout(()=>t.style.display='none', 300);
  }, 2000);
}

// ── IndexedDB 영구 저장 ────────────────────────────────────────
const DB_NAME='foodilogram', DB_VER=1;
let db=null;

function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('photos')) d.createObjectStore('photos',{keyPath:'ts'});
      if(!d.objectStoreNames.contains('videos')) d.createObjectStore('videos',{keyPath:'ts'});
    };
    req.onsuccess=e=>{ db=e.target.result; resolve(db); };
    req.onerror=e=>reject(e);
  });
}

function dbSavePhoto(photo){
  if(!db) return;
  const tx=db.transaction('photos','readwrite');
  tx.objectStore('photos').put({ts:photo.ts, src:photo.src, overlays:photo.overlays||[]});
}

function dbSaveVideo(video){
  if(!db) return;
  const tx=db.transaction('videos','readwrite');
  tx.objectStore('videos').put({ts:video.ts, blob:video.blob, thumb:video.thumb, duration:video.duration, overlays:video.overlays||[]});
}

function dbDeletePhoto(ts){
  if(!db) return;
  db.transaction('photos','readwrite').objectStore('photos').delete(ts);
}

function dbDeleteVideo(ts){
  if(!db) return;
  db.transaction('videos','readwrite').objectStore('videos').delete(ts);
}

function dbUpdatePhoto(photo){
  if(!db) return;
  db.transaction('photos','readwrite').objectStore('photos').put({ts:photo.ts,src:photo.src,overlays:photo.overlays||[]});
}

function dbUpdateVideo(video){
  if(!db) return;
  db.transaction('videos','readwrite').objectStore('videos').put({ts:video.ts,blob:video.blob,thumb:video.thumb,duration:video.duration,overlays:video.overlays||[]});
}

async function dbLoadAll(){
  if(!db) return;
  const getAll=store=>new Promise(res=>{
    const req=db.transaction(store,'readonly').objectStore(store).getAll();
    req.onsuccess=e=>res(e.target.result||[]);
    req.onerror=()=>res([]);
  });
  const [photos,videos]=await Promise.all([getAll('photos'),getAll('videos')]);
  state.photos=photos.sort((a,b)=>b.ts-a.ts);

  // 영상: blob이 있는지 확인하고 thumb 없으면 재생성
  const loadedVideos=[];
  for(const v of videos.sort((a,b)=>b.ts-a.ts)){
    if(!v.blob){ continue; } // blob 없으면 스킵
    // thumb 없으면 재추출
    if(!v.thumb){
      try{ v.thumb=await extractThumb(v.blob); }catch(e){}
    }
    loadedVideos.push(v);
  }
  state.videos=loadedVideos;
  updateStats();
  console.log(`DB 로드: 사진 ${state.photos.length}장, 영상 ${state.videos.length}개`);
}

// 앱 시작 시 DB 열고 데이터 로드
openDB().then(()=>dbLoadAll()).catch(e=>console.warn('DB error',e));

const T = {green:'#4A8C5C',greenDk:'#2F6640',white:'#FFFFFF',text:'#1E2D1F',textMute:'#9EB89F'};
const TEXT_COLORS = ['#ffffff','#FFE066','#7DFFB3','#FF7D7D','#7DB8FF','#FFAF7D','#E8D5FF'];
const TEXT_SIZES  = [11,14,18,24,30];

// ── Helpers ───────────────────────────────────────────────────
const fmtTime = d => {
  const h=d.getHours(), m=String(d.getMinutes()).padStart(2,'0');
  const ampm=h<12?'AM':'PM', h12=h%12||12;
  return `${String(h12).padStart(2,'0')}:${m} ${ampm}`;
};
const fmtDate = d => `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
const fmtDateKo = d => ['일','월','화','수','목','금','토'][d.getDay()]+'요일';
const fmtDur = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
const $ = id => document.getElementById(id);

// ── Clock ─────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const t=fmtTime(now);
  $('clock').textContent = t;
  $('date-txt').textContent = `🌿 ${fmtDate(now)} ${fmtDateKo(now)}`;
  const vft=$('vf-time'); if(vft) vft.textContent=t;
}
setInterval(updateClock, 1000); updateClock();

// ── Nav ───────────────────────────────────────────────────────
// ── 네이티브 카메라 / 갤러리 핸들러 ─────────────────────────
function handleNativePhoto(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const photo={src:ev.target.result, ts:Date.now(), overlays:[]};
    state.photos.unshift(photo);
    dbSavePhoto(photo);
    updateStats();
    showToast('사진 추가됨!','📸');
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

async function handleNativeVideo(e){
  const file=e.target.files[0]; if(!file) return;
  const blob=new Blob([await file.arrayBuffer()],{type:file.type});
  const thumb=await extractThumb(blob);
  const video={blob, thumb, ts:Date.now(), duration:0, overlays:[]};
  // get duration
  const url=URL.createObjectURL(blob);
  const tmp=document.createElement('video');
  tmp.src=url;
  tmp.onloadedmetadata=()=>{
    video.duration=Math.round(tmp.duration);
    URL.revokeObjectURL(url);
    state.videos.unshift(video);
    dbSaveVideo(video);
    updateStats();
    showToast('영상 추가됨!','🎬');
  };
  tmp.onerror=()=>{
    URL.revokeObjectURL(url);
    state.videos.unshift(video);
    dbSaveVideo(video);
    updateStats();
    showToast('영상 추가됨!','🎬');
  };
  tmp.load();
  e.target.value='';
}

async function handleGalleryImport(e){
  const files=Array.from(e.target.files); if(!files.length) return;
  let photoCount=0, videoCount=0;
  for(const file of files){
    if(file.type.startsWith('image/')){
      await new Promise(res=>{
        const reader=new FileReader();
        reader.onload=ev=>{
          const photo={src:ev.target.result, ts:Date.now()-(files.indexOf(file)*10), overlays:[]};
          state.photos.unshift(photo);
          dbSavePhoto(photo);
          photoCount++;
          res();
        };
        reader.readAsDataURL(file);
      });
    } else if(file.type.startsWith('video/')){
      const blob=new Blob([await file.arrayBuffer()],{type:file.type});
      const thumb=await extractThumb(blob);
      const video={blob, thumb, ts:Date.now()-(files.indexOf(file)*10), duration:0, overlays:[]};
      state.videos.unshift(video);
      dbSaveVideo(video);
      videoCount++;
    }
  }
  updateStats();
  const msg=[];
  if(photoCount) msg.push(`사진 ${photoCount}장`);
  if(videoCount) msg.push(`영상 ${videoCount}개`);
  showToast(`${msg.join(', ')} 가져옴!`,'🖼');
  e.target.value='';
}

function switchView(v) {
  ['camera','gallery','collage'].forEach(k => {
    $(`cam-view`).style.display = k==='camera' ? '' : 'none';
    const el = $(k+'-view'); if(el) el.style.display = 'none';
    $('nav-'+k).classList.remove('active');
    $('navlbl-'+k).classList.remove('active');
  });
  if(v==='camera') $('cam-view').style.display='flex';
  else { const el=$(v+'-view'); if(el) el.style.display=''; }
  $('nav-'+v).classList.add('active');
  $('navlbl-'+v).classList.add('active');
  if(v==='gallery') renderGallery();
  if(v==='collage') renderCollage();
  if(v==='camera') startCamera();
}

// ── Camera ────────────────────────────────────────────────────
async function startCamera() {
  try {
    if(state.stream) state.stream.getTracks().forEach(t=>t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:state.facingMode,width:{ideal:1280},height:{ideal:720}}, audio:true
    });
    state.stream = stream;
    const vid = $('cam-video');
    vid.srcObject = stream; vid.style.display='block';
    $('cam-error').style.display='none';
    await vid.play();
  } catch(e) {
    $('cam-video').style.display='none';
    $('cam-error').style.display='flex';
  }
}

function flipCamera() {
  state.facingMode = state.facingMode==='user'?'environment':'user';
  startCamera();
}

function setMode(m) {
  if(state.recording) return;
  state.captureMode = m;
  $('mode-photo').classList.toggle('active', m==='photo');
  $('mode-video').classList.toggle('active', m==='video');
  // show/hide video timer row
  const trv=$('timer-row-video');
  if(trv) trv.style.display = m==='video' ? 'flex' : 'none';
  // reset shutter look
  const btn=$('shutter-btn');
  const inner=$('shutter-inner');
  if(btn) btn.classList.remove('rec-mode');
  if(inner) inner.className = 'shutter-inner' + (m==='video' ? ' vid' : '');
}

function setTimer(s) {
  state.timerSec = s;
  // only update pills in currently visible timer row
  const row = $('timer-row-video');
  if(row) {
    row.querySelectorAll('.timer-pill').forEach(b=>{
      b.classList.toggle('active', b.textContent === s+'초');
    });
  }
}

function handleShutter() {
  console.log('shutter', state.captureMode, state.recording);
  if(state.captureMode==='video') {
    if(state.recording) stopRecording();
    else startRecording();
    return;
  }
  // photo — instant
  takePhoto();
}

function takePhoto() {
  const vid = $('cam-video');
  if(!vid || !vid.videoWidth) { console.warn('video not ready'); return; }
  const c = document.createElement('canvas');
  c.width = vid.videoWidth; c.height = vid.videoHeight;
  const ctx = c.getContext('2d');
  if(state.facingMode==='user') { ctx.save(); ctx.translate(c.width,0); ctx.scale(-1,1); }
  ctx.drawImage(vid, 0, 0);
  if(state.facingMode==='user') ctx.restore();
  const photo={ src: c.toDataURL('image/jpeg',0.92), ts: Date.now(), overlays:[] };
  state.photos.unshift(photo);
  dbSavePhoto(photo);
  updateStats();
  const fl=$('flash');
  if(fl){ fl.style.transition='none'; fl.style.opacity='0.75'; setTimeout(()=>{ fl.style.transition='opacity .3s'; fl.style.opacity='0'; },80); }
}

async function startRecording() {
  if(!state.stream) return;
  if(state.recording) return;
  state.chunks=[];
  // 지원 mime 타입 선택
  const mimes=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4'];
  const mime=mimes.find(m=>{ try{return MediaRecorder.isTypeSupported(m);}catch(e){return false;} })||'video/webm';
  try {
    state.recorder=new MediaRecorder(state.stream,{mimeType:mime});
  } catch(e) {
    try { state.recorder=new MediaRecorder(state.stream); }
    catch(e2) { alert('이 브라우저는 영상 녹화를 지원하지 않아요'); return; }
  }
  state.recorder.ondataavailable=e=>{if(e.data&&e.data.size>0)state.chunks.push(e.data);};
  state.recorder.onstop=async()=>{
    const usedMime=state.recorder.mimeType||mime;
    const blob=new Blob(state.chunks,{type:usedMime});
    const thumb=await extractThumb(blob);
    const video={blob,thumb,ts:Date.now(),duration:state.recDur,overlays:[]};
    state.videos.unshift(video);
    dbSaveVideo(video);
    state.recDur=0; updateStats();
    const rb=$('rec-badge'); if(rb) rb.style.display='none';
    const sb=$('shutter-btn'); if(sb) sb.classList.remove('rec-mode');
    const si=$('shutter-inner'); if(si) si.className='shutter-inner vid';
    state.recording=false;
  };
  state.recorder.start(100);
  state.recording=true;
  const rb=$('rec-badge'); if(rb) rb.style.display='flex';
  const sb=$('shutter-btn'); if(sb) sb.classList.add('rec-mode');
  const si=$('shutter-inner'); if(si) si.className='shutter-inner stop';
  let sec=0;
  state.recTimer=setInterval(()=>{
    sec++; state.recDur=sec;
    const rt=$('rec-txt'); if(rt) rt.textContent=`REC ${fmtDur(sec)}`;
    if(sec>=state.timerSec) stopRecording();
  },1000);
}

function stopRecording() {
  clearInterval(state.recTimer);
  if(state.recorder && state.recording){
    try { state.recorder.stop(); } catch(e) { console.warn('stop error',e); }
  }
  state.recording=false;
  const rb=$('rec-badge'); if(rb) rb.style.display='none';
  const sb=$('shutter-btn'); if(sb) sb.classList.remove('rec-mode');
  const si=$('shutter-inner'); if(si) si.className='shutter-inner vid';
}

async function extractThumb(blob) {
  return new Promise(res=>{
    const url=URL.createObjectURL(blob);
    const v=document.createElement('video');
    v.muted=true; v.src=url; v.currentTime=0.1;
    v.onloadeddata=()=>{
      const c=document.createElement('canvas');
      c.width=v.videoWidth||320; c.height=v.videoHeight||240;
      c.getContext('2d').drawImage(v,0,0);
      res(c.toDataURL('image/jpeg',0.8));
      URL.revokeObjectURL(url);
    };
    v.onerror=()=>{res(null);URL.revokeObjectURL(url);};
    v.load();
  });
}

function drawPhotoCollage(){
  const photos=getColPhotos();
  if(photos.length<2){
    const c=$('collage-canvas'); c.width=400; c.height=400;
    const ctx=c.getContext('2d'); ctx.fillStyle='#EFF4EB'; ctx.fillRect(0,0,400,400);
    ctx.fillStyle='#6B8A6D'; ctx.font='14px sans-serif'; ctx.textAlign='center';
    ctx.fillText('사진을 2장 이상 선택해주세요',200,200);
    return;
  }
  const W=1080, H=state.photoRatio==='3:4'?1350:1080;
  const c=$('collage-canvas'); c.width=W; c.height=H;
  const ctx=c.getContext('2d');
  const gap=6,pad=14,barH=32;
  const innerW=W-pad*2, innerH=H-pad*2-barH-4;
  ctx.fillStyle='#FAFCF8'; ctx.fillRect(0,0,W,H);

  const drawImg=(src,x,y,w,h)=>new Promise(res=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{
      ctx.save(); ctx.beginPath(); ctx.roundRect(x,y,w,h,8); ctx.clip();
      const s=Math.max(w/img.width,h/img.height);
      ctx.drawImage(img,x+(w-img.width*s)/2,y+(h-img.height*s)/2,img.width*s,img.height*s);
      ctx.restore(); res();
    };
    img.onerror=res; img.src=src;
  });

  const stampOver=(text,x,y,w,h)=>{
    const size=30; ctx.save();
    ctx.font=`bold ${size}px 'Helvetica Neue',sans-serif`;
    const tw=ctx.measureText(text).width;
    const px=x+10,py=y+h/2;
    ctx.fillStyle='rgba(20,38,22,0.68)';
    ctx.beginPath(); ctx.roundRect(px,py-size*0.75,tw+18,size+8,6); ctx.fill();
    ctx.fillStyle='rgba(250,252,248,0.96)'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(text,px+9,py+2); ctx.restore();
  };

  const drawBar=()=>{
    const barY=H-pad-barH;
    ctx.fillStyle=T.green;
    ctx.beginPath(); ctx.roundRect(pad,barY,innerW,barH,4); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`24px sans-serif`; ctx.textAlign='left'; ctx.textBaseline='middle';
    const d=new Date(photos[0].ts);
    ctx.fillText(`${fmtDate(d)}  ${fmtDateKo(d)}`,pad+10,barY+barH/2);
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.textAlign='right';
    ctx.fillText(`🌿 foodi logram · ${photos.length} shots`,W-pad-10,barY+barH/2);
  };

  const render=async()=>{
    const layout=state.photoLayout;
    const sliced=photos.slice(0,{grid2x2:4,grid2x3:6,strip:6,feature:6}[layout]);
    if(layout==='grid2x2'){
      const cw=(innerW-gap)/2,ch=(innerH-gap)/2;
      await Promise.all(sliced.map((p,i)=>{
        const x=pad+(i%2)*(cw+gap),y=pad+Math.floor(i/2)*(ch+gap);
        return drawImg(p.src,x,y,cw,ch).then(()=>stampOver(fmtTime(new Date(p.ts)),x,y,cw,ch));
      }));
    } else if(layout==='grid2x3'){
      const cw=(innerW-gap)/2,ch=(innerH-gap*2)/3;
      await Promise.all(sliced.map((p,i)=>{
        const x=pad+(i%2)*(cw+gap),y=pad+Math.floor(i/2)*(ch+gap);
        return drawImg(p.src,x,y,cw,ch).then(()=>stampOver(fmtTime(new Date(p.ts)),x,y,cw,ch));
      }));
    } else if(layout==='strip'){
      const n=sliced.length,cw=(innerW-gap*(n-1))/n;
      await Promise.all(sliced.map((p,i)=>{
        const x=pad+i*(cw+gap);
        return drawImg(p.src,x,pad,cw,innerH).then(()=>stampOver(fmtTime(new Date(p.ts)),x,pad,cw,innerH));
      }));
    } else {
      const mainW=innerW*0.58,subW=innerW-mainW-gap,rest=sliced.slice(1);
      const subH=(innerH-gap*(rest.length-1))/rest.length;
      await drawImg(sliced[0].src,pad,pad,mainW,innerH);
      stampOver(fmtTime(new Date(sliced[0].ts)),pad,pad,mainW,innerH);
      await Promise.all(rest.map((p,i)=>{
        const x=pad+mainW+gap,y=pad+i*(subH+gap);
        return drawImg(p.src,x,y,subW,subH).then(()=>stampOver(fmtTime(new Date(p.ts)),x,y,subW,subH));
      }));
    }
    drawBar();
  };
  render();
  const info=getColPhotos().length;
  $('col-photo-info').textContent=`${info}장 선택 · ${state.photoRatio}`;
}

// ── Video Collage ─────────────────────────────────────────────
function getColVideos(){
  if(state.colVideoIdx&&state.colVideoIdx.length) return state.colVideoIdx.map(i=>state.videos[i]).filter(Boolean);
  return state.videos.slice(0,6);
}

function getVLayout(n, ratio){
  if(n<=1) return {cols:1,rows:1,tpl:'1fr',rowTpl:'1fr'};
  if(n===2) return {cols:1,rows:2,tpl:'1fr',rowTpl:'1fr 1fr'};
  if(n===3) return {cols:1,rows:3,tpl:'1fr',rowTpl:'1fr 1fr 1fr'};
  if(n===4){
    if(ratio==='3:4') return {cols:2,rows:2,tpl:'1fr 1fr',rowTpl:'1fr 1fr'};
    return {cols:1,rows:4,tpl:'1fr',rowTpl:'repeat(4,1fr)'};
  }
  if(n===5) return {cols:1,rows:5,tpl:'1fr',rowTpl:'repeat(5,1fr)'};
  return {cols:2,rows:3,tpl:'1fr 1fr',rowTpl:'repeat(3,1fr)'};
}

function setVLayout(layout, maxClips){
  state.videoLayout = layout;
  state.videoMaxClips = maxClips;
  // update active button
  document.querySelectorAll('[id^="vlayout-"]').forEach(b=>b.classList.remove('active'));
  const el=$('vlayout-'+layout); if(el) el.classList.add('active');
  renderVideoCollage();
}

function setVRatio(ratio){
  state.videoRatio = ratio;
  document.querySelectorAll('#vratio-9x16,#vratio-3x4').forEach(b=>b.classList.remove('active'));
  const map={'9:16':'vratio-9x16','3:4':'vratio-3x4'};
  const el=$(map[ratio]); if(el) el.classList.add('active');
  // 미리보기 영역 비율 갱신
  const grid=$('vcollage-grid');
  if(grid) grid.style.aspectRatio = ratio==='3:4' ? '1080/1350' : '9/16';
  // 4클립 버튼 라벨: 3:4일 땐 2×2, 그 외엔 1×4
  const lbl4=$('vlayout-1x4-label');
  if(lbl4) lbl4.textContent = ratio==='3:4' ? '2×2' : '1×4';
  renderVideoCollage();
}

function renderVideoCollage(){
  const allVideos=getColVideos();
  const n=Math.min(allVideos.length, state.videoMaxClips||6);
  const videos=allVideos.slice(0,n);
  const lbl=state.videoLayout||'auto';
  const lbl4=$('vlayout-1x4-label');
  if(lbl4) lbl4.textContent = state.videoRatio==='3:4' ? '2×2' : '1×4';
  const infoEl=$('vcol-info-txt');
  if(infoEl) infoEl.textContent=`${n}개 클립 선택 · ${state.videoRatio||'9:16'}`;
  if(videos.length>0){
    const d=new Date(videos[0].ts);
    $('vcol-date').textContent=`${fmtDate(d)} ${fmtDateKo(d)}`;
    $('vcol-clips').textContent=`${n} clips`;
  }
  const {tpl,rowTpl}=getVLayout(n, state.videoRatio);
  const grid=$('vcollage-grid');
  // 선택한 비율 적용 (9:16 또는 3:4)
  grid.style.gridTemplateColumns=tpl;
  grid.style.gridTemplateRows=rowTpl;
  grid.style.width='100%';
  grid.style.aspectRatio = state.videoRatio==='3:4' ? '1080/1350' : '9/16';
  grid.style.height='';
  grid.style.paddingBottom='';
  grid.style.position='relative';

  // clear old cells — wrap in absolute container for padding-bottom trick
  grid.innerHTML='<div id="vcollage-inner" style="position:absolute;inset:0;display:grid;gap:3px;padding:3px;grid-template-columns:'+tpl+';grid-template-rows:'+rowTpl+'"></div>';
  const inner=grid.querySelector('#vcollage-inner');
  // each cell fills its grid slot fully
  
  if(state.vcRevealTimer) clearInterval(state.vcRevealTimer);
  state.vcRevealed=[]; state.vcAllRevealed=false;

  const cells=[];
  videos.slice(0,n).forEach((v,i)=>{
    const url=URL.createObjectURL(v.blob);
    const cell=document.createElement('div');
    cell.className='vcell hidden';
    let playing=false;
    cell.innerHTML=`
      <video src="${url}" loop muted playsinline style="width:100%;height:100%;object-fit:cover;display:block"></video>
      ${v.overlays&&v.overlays.length?v.overlays.map(ov=>`<span style="position:absolute;left:${ov.x}%;top:${ov.y}%;transform:translate(-50%,-50%);font-size:${ov.size||18}px;font-weight:700;color:${ov.color||'#fff'};text-shadow:0 1px 6px rgba(0,0,0,0.7);pointer-events:none">${ov.text}</span>`).join(''):''}
      <div class="vcell-ts">${fmtTime(new Date(v.ts))}</div>
      <div class="vcell-play"><div class="vcell-play-btn">▶</div></div>`;
    cell.onclick=()=>{
      const vid=cell.querySelector('video');
      const overlay=cell.querySelector('.vcell-play');
      playing=!playing;
      playing?vid.play():vid.pause();
      overlay.style.display=playing?'none':'flex';
    };
    (inner||grid).appendChild(cell);
    cells.push(cell);
  });

  // reveal one by one
  let i=0;
  state.vcRevealTimer=setInterval(()=>{
    if(i<cells.length){
      cells[i].classList.remove('hidden');
      // order badge
      const badge=document.createElement('div');
      badge.className='order-badge'; badge.textContent=i+1;
      cells[i].appendChild(badge);
      setTimeout(()=>badge.remove(),900);
      i++;
    } else {
      clearInterval(state.vcRevealTimer);
      state.vcAllRevealed=true;
    }
  },1000);
}

// ── 영상 콜라주를 MediaRecorder로 WebM 영상으로 렌더링 ────────
async function renderVideoCollageToBlob(onProgress) {
  // 콜라주가 아직 렌더링 안 됐으면 먼저 그려서 video 엘리먼트를 만든다
  if(!$('vcollage-grid').querySelector('video')){
    renderVideoCollage();
    await new Promise(r=>setTimeout(r,300));
  }

  const W=1080, H = state.videoRatio==='3:4' ? 1350 : 1920;
  const FPS=30;
  const canvas=document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');

  const grid=$('vcollage-grid');
  const inner=grid.querySelector('#vcollage-inner')||grid;
  const videoEls=Array.from(inner.querySelectorAll('video'));
  const cells=Array.from(inner.querySelectorAll('.vcell'));
  const allVideos=getColVideos();
  const n=Math.min(videoEls.length, allVideos.length, cells.length);

  if(n===0){
    throw new Error('영상이 없습니다. 콜라주 영상을 먼저 선택해주세요.');
  }

  const gridRect=grid.getBoundingClientRect();
  const barH=60; // 하단 정보 바 높이 (1080px 기준)
  const gridH=H-barH; // 비디오 그리드가 차지할 실제 높이

  // 셀 위치 사전 계산 (셀 사이 여백을 명확히 주어 라운드가 보이도록 안쪽으로 패딩)
  // 화면상 grid 비율을 그대로 따르되, 세로 방향은 gridH 영역에 맞춰 스케일
  const cellPad=6; // 1080px 캔버스 기준 셀 사이 여백
  const cellLayouts=cells.map(cell=>{
    const cr=cell.getBoundingClientRect();
    const rawX=(cr.left-gridRect.left)/gridRect.width*W;
    const rawY=(cr.top-gridRect.top)/gridRect.height*gridH;
    const rawW=cr.width/gridRect.width*W;
    const rawH=cr.height/gridRect.height*gridH;
    return {
      x:Math.round(rawX+cellPad/2),
      y:Math.round(rawY+cellPad/2),
      w:Math.max(1,Math.round(rawW-cellPad)),
      h:Math.max(1,Math.round(rawH-cellPad)),
    };
  });

  // 각 클립 길이 — 메타데이터 로드 보장
  await Promise.all(videoEls.map(v=>new Promise(resolve=>{
    if(v.readyState>=1){ resolve(); return; } // HAVE_METADATA 이상
    let done=false;
    const finish=()=>{ if(!done){ done=true; resolve(); } };
    v.onloadedmetadata=finish;
    setTimeout(finish, 1000);
  })));

  const durations=videoEls.map(v=>v.duration && isFinite(v.duration) ? v.duration : 3);
  const introDur=n; // 클립 수만큼 1초씩 등장
  const playDur=Math.max(...durations, 1);
  const totalDur=introDur+playDur;

  // 모든 영상 처음부터 준비 (타임아웃 폴백 포함)
  videoEls.forEach(v=>{ v.muted=true; v.pause(); });
  await Promise.all(videoEls.map(v=>new Promise(resolve=>{
    let done=false;
    const finish=()=>{ if(!done){ done=true; resolve(); } };
    v.onseeked=finish;
    try{ v.currentTime=0; }catch(e){}
    setTimeout(finish, 300);
  })));

  // MediaRecorder
  const stream=canvas.captureStream(FPS);
  const mimes=[
    'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
    'video/mp4;codecs=avc1',
    'video/mp4',
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm',
  ];
  const mime=mimes.find(m=>{ try{return MediaRecorder.isTypeSupported(m);}catch(e){return false;} })||'video/webm';
  const recorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:16000000});
  const chunks=[];
  recorder.ondataavailable=e=>{ if(e.data&&e.data.size>0) chunks.push(e.data); };

  return new Promise((resolve,reject)=>{
    // 전체 안전장치: 예상 시간의 3배 또는 최소 20초 지나면 강제 종료
    const hardLimitMs = Math.max(20000, (totalDur*1000)*3);
    const hardTimer = setTimeout(()=>{
      console.warn('렌더링 타임아웃 — 강제 종료');
      try{ if(recorder.state!=='inactive') recorder.stop(); }catch(e){}
    }, hardLimitMs);

    recorder.onstop=()=>{
      clearTimeout(hardTimer);
      if(chunks.length===0){
        reject(new Error('영상 데이터를 생성하지 못했습니다.'));
        return;
      }
      resolve(new Blob(chunks,{type:mime}));
    };
    recorder.onerror=(e)=>{
      clearTimeout(hardTimer);
      reject(new Error('녹화 중 오류: '+(e.error?.message||e.message||'알 수 없음')));
    };

    recorder.start(100);

    let startTime=performance.now();
    let playStarted=false;
    // 몇 개 클립이 현재 보여야 하는지
    let lastVisible=-1;

    function drawCell(i, vid){
      const {x,y,w,h}=cellLayouts[i]||{};
      if(!w||!h) return;
      ctx.save();
      const radius=Math.min(w,h)*0.06; // 셀 라운드 처리 (더 또렷하게)
      ctx.beginPath(); ctx.roundRect(x,y,w,h,radius); ctx.clip();
      const vw=vid.videoWidth||w, vh=vid.videoHeight||h;
      const scale=Math.max(w/vw,h/vh);
      const sw=vw*scale, sh=vh*scale;
      ctx.drawImage(vid,x+(w-sw)/2,y+(h-sh)/2,sw,sh);
      const elapsed=(performance.now()-startTime)/1000;
      // 촬영 시간 표기 (왼쪽 중앙, 화면과 동일 위치)
      if(allVideos[i]){
        const ts=fmtTime(new Date(allVideos[i].ts));
        const tsFontSize=Math.round(24*3.2*0.7*0.7); // vcell-ts 24px 기준, 70%*70% 크기
        ctx.font=`bold ${tsFontSize}px sans-serif`;
        ctx.textAlign='left'; ctx.textBaseline='middle';
        const tw=ctx.measureText(ts).width;
        const px=x+10*3.2, py=y+h/2;
        ctx.fillStyle='rgba(15,30,15,0.6)';
        ctx.beginPath(); ctx.roundRect(px-12,py-tsFontSize*0.65,tw+24,tsFontSize*1.3,8); ctx.fill();
        ctx.fillStyle='rgba(250,252,248,0.95)';
        ctx.fillText(ts,px,py+2);
      }
      // 텍스트 오버레이 — 캔버스 해상도에 맞게 스케일 업 (화면 표시 셀 너비 기준 ~240px → 실제 1080px 캔버스 비율 보정)
      if(allVideos[i]&&allVideos[i].overlays){
        const scaleUp = 3.2; // 미리보기 대비 저장본 글씨 확대 비율
        allVideos[i].overlays.forEach(ov=>{
          const sizePx = (ov.size||18) * scaleUp;
          ctx.font=`bold ${sizePx}px sans-serif`;
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.shadowColor='rgba(0,0,0,0.75)'; ctx.shadowBlur=10;
          ctx.fillStyle=ov.color||'#fff';
          ctx.fillText(ov.text||'',(x+(ov.x/100)*w),(y+(ov.y/100)*h));
          ctx.shadowBlur=0;
        });
      }
      ctx.restore();
    }

    let rafId=null;
    let stopped=false;

    function drawBottomBar(){
      ctx.fillStyle='#181818';
      ctx.fillRect(0,gridH,W,barH);
      const d=allVideos[0]?new Date(allVideos[0].ts):new Date();
      ctx.font=`28px sans-serif`;
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillStyle='#aaa';
      ctx.fillText(`${fmtDate(d)} ${fmtDateKo(d)}`, 28, gridH+barH/2);

      const clipsTxt=`${n} clips`;
      ctx.font=`bold 26px sans-serif`;
      const tw=ctx.measureText(clipsTxt).width;
      const px=W-28-tw-24, py=gridH+barH/2;
      ctx.fillStyle='rgba(74,140,92,0.18)';
      ctx.beginPath(); ctx.roundRect(px,py-18,tw+24,36,8); ctx.fill();
      ctx.fillStyle='#4A8C5C';
      ctx.fillText(clipsTxt, px+12, py);
    }

    function drawFrame(){
      if(stopped) return;
      const elapsed=(performance.now()-startTime)/1000;

      if(elapsed>=totalDur){
        stopped=true;
        videoEls.forEach(v=>v.pause());
        setTimeout(()=>recorder.stop(), 200); // 마지막 청크 flush 대기
        return;
      }

      ctx.fillStyle='#0d0d0d';
      ctx.fillRect(0,0,W,H);

      // 인트로: 1초마다 클립 하나씩 등장
      const visibleCount = elapsed<introDur ? Math.floor(elapsed)+1 : n;

      // 새 클립 등장 시 재생 시작
      if(visibleCount-1 > lastVisible){
        for(let i=lastVisible+1; i<visibleCount; i++){
          if(videoEls[i]){
            videoEls[i].currentTime=0;
            videoEls[i].play().catch(()=>{});
          }
        }
        lastVisible=visibleCount-1;
      }

      // 인트로 끝 → 전체 처음부터 동시 재생
      if(elapsed>=introDur && !playStarted){
        videoEls.forEach(v=>{ v.currentTime=0; v.play().catch(()=>{}); });
        playStarted=true;
      }

      // 보이는 클립 그리기
      for(let i=0; i<visibleCount&&i<n; i++){
        if(videoEls[i]) drawCell(i, videoEls[i]);
      }

      drawBottomBar();

      if(onProgress) onProgress(totalDur>0 ? Math.min(elapsed/totalDur, 0.99) : 0.5);
      rafId=requestAnimationFrame(drawFrame);
    }

    // 첫 프레임 시작 전 잠깐 대기 (MediaRecorder 준비)
    setTimeout(()=>{ startTime=performance.now(); drawFrame(); }, 200);
  });
}

async function saveVideoCollage(){
  const btn=event.currentTarget;
  btn.textContent='⏳ 렌더링 중...'; btn.disabled=true;
  try{
    const blob=await renderVideoCollageToBlob(p=>{
      btn.textContent=`⏳ ${Math.round(p*100)}%`;
    });
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const ext=blob.type.includes('mp4')?'mp4':'webm';
    a.download=`foodilogram_${Date.now()}.${ext}`;
    a.href=url; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
  }catch(e){ alert('저장 실패: '+e.message); console.error(e); }
  finally{ btn.textContent='💾 저장'; btn.disabled=false; }
}

async function shareVideoCollage(){
  const btn=event.currentTarget;
  btn.textContent='⏳ 0%'; btn.disabled=true;
  try{
    const blob=await renderVideoCollageToBlob(p=>{
      btn.textContent=`⏳ ${Math.round(p*100)}%`;
    });
    const ext=blob.type.includes('mp4')?'mp4':'webm';
    const file=new File([blob],`foodilogram_${Date.now()}.${ext}`,{type:blob.type});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file],title:'foodi logram',text:'오늘의 식단 기록 🌿'}); showToast('공유 완료!','🔗'); return; }
      catch(e){ if(e.name==='AbortError') return; }
    }
    // 공유 불가 시 저장으로 폴백
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.download=`foodilogram_${Date.now()}.${ext}`;
    a.href=url; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    showToast('공유 미지원 — 대신 저장했어요','💾');
  }catch(e){
    console.error(e);
    alert('공유 실패: '+(e.message||'알 수 없는 오류'));
  }
  finally{ btn.textContent='🔗 공유하기'; btn.disabled=false; }
}

// ── Text Editor ───────────────────────────────────────────────
function openEditor(type,idx){
  state.editingType=type; state.editingIdx=idx;
  const item=type==='photo'?state.photos[idx]:state.videos[idx];
  state.edOverlays=item.overlays?[...item.overlays.map(o=>({...o}))]:[];
  state.editingOvId=null;
  $('ed-title').textContent=type==='photo'?'📷 텍스트 편집':'🎬 텍스트 편집';

  // Media
  const wrap=$('ed-media-wrap');
  wrap.innerHTML='';
  wrap.style.cssText='position:absolute;inset:0';
  if(type==='photo'){
    const img=document.createElement('img');
    img.src=item.src; img.style.cssText='width:100%;height:100%;object-fit:contain;display:block';
    wrap.appendChild(img);
  } else {
    const url=URL.createObjectURL(item.blob);
    const vid=document.createElement('video');
    vid.src=url; vid.autoplay=true; vid.loop=true; vid.muted=true; vid.playsInline=true;
    vid.style.cssText='width:100%;height:100%;object-fit:contain;display:block';
    wrap.appendChild(vid);
  }
  renderEdOverlays();
  renderOvList();
  $('ed-panel').style.display='none';
  $('text-editor').classList.add('open');
}

function closeEditor(){ $('text-editor').classList.remove('open'); }

function saveEditor(){
  if(state.editingType==='photo'){
    state.photos[state.editingIdx].overlays=[...state.edOverlays];
    bakePhotoOverlays(state.editingIdx);
  } else {
    state.videos[state.editingIdx].overlays=[...state.edOverlays];
    dbUpdateVideo(state.videos[state.editingIdx]);
  }
  closeEditor(); renderGallery();
}

async function bakePhotoOverlays(idx){
  const p=state.photos[idx];
  if(!p.overlays||!p.overlays.length) return;
  const img=new Image(); img.src=p.src;
  await new Promise(res=>img.onload=res);
  const c=document.createElement('canvas');
  c.width=img.width; c.height=img.height;
  const ctx=c.getContext('2d');
  ctx.drawImage(img,0,0);
  p.overlays.forEach(ov=>{
    ctx.font=`bold ${ov.size||18}px 'Helvetica Neue',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.65)'; ctx.shadowBlur=10;
    ctx.fillStyle=ov.color||'#fff';
    ctx.fillText(ov.text||'',(ov.x/100)*c.width,(ov.y/100)*c.height);
    ctx.shadowBlur=0;
  });
  p.src=c.toDataURL('image/jpeg',0.95);
  dbUpdatePhoto(p);
}

function renderEdOverlays(){
  const wrap=$('ed-overlays');
  wrap.innerHTML='';
  wrap.style.cssText='position:absolute;inset:0;pointer-events:none';
  state.edOverlays.forEach(ov=>{
    const el=document.createElement('div');
    el.className='ov-label'; el.style.left=ov.x+'%'; el.style.top=ov.y+'%';
    el.style.pointerEvents='auto';
    const sp=document.createElement('span');
    sp.textContent=ov.text; sp.style.fontSize=(ov.size||18)+'px'; sp.style.color=ov.color||'#fff';
    if(state.editingOvId===ov.id) sp.classList.add('editing');
    el.appendChild(sp);
    el.onclick=(e)=>{ e.stopPropagation(); startEditOv(ov.id); };
    wrap.appendChild(el);
  });
  $('tap-hint').style.display=state.editingOvId?'block':'none';
}

function renderOvList(){
  const list=$('ov-list');
  list.innerHTML='';
  if(!state.edOverlays.length){
    list.innerHTML='<div class="empty-ov-hint">아래 + 버튼으로 텍스트를 추가해보세요</div>';
    return;
  }
  state.edOverlays.forEach(ov=>{
    const item=document.createElement('div');
    item.className='ov-item'+(state.editingOvId===ov.id?' active':'');
    item.innerHTML=`<span class="ov-item-txt" style="color:${ov.color||'#fff'}">${ov.text||'(빈 텍스트)'}</span>
      <div class="ov-item-btns">
        <button onclick="startEditOv(${ov.id})">✏️</button>
        <button onclick="deleteOv(${ov.id})">🗑</button>
      </div>`;
    item.onclick=()=>startEditOv(ov.id);
    list.appendChild(item);
  });
}

function addOverlay(){
  const ov={id:Date.now(),text:'텍스트 입력',x:50,y:50,color:'#ffffff',size:18};
  state.edOverlays.push(ov);
  startEditOv(ov.id);
}

function startEditOv(id){
  state.editingOvId=id;
  const ov=state.edOverlays.find(o=>o.id===id);
  if(!ov) return;
  state.edDraft={...ov};
  $('ed-textarea').value=ov.text;
  $('ed-panel').style.display='block';
  renderColorRow(); renderSizeRow();
  renderEdOverlays(); renderOvList();
}

function deleteOv(id){
  state.edOverlays=state.edOverlays.filter(o=>o.id!==id);
  if(state.editingOvId===id){ state.editingOvId=null; $('ed-panel').style.display='none'; }
  renderEdOverlays(); renderOvList();
}

function applyEdit(){
  state.edOverlays=state.edOverlays.map(o=>o.id===state.editingOvId?{...o,...state.edDraft}:o);
  renderEdOverlays(); renderOvList();
}

$('ed-textarea').oninput=e=>{
  state.edDraft.text=e.target.value;
  state.edOverlays=state.edOverlays.map(o=>o.id===state.editingOvId?{...o,text:e.target.value}:o);
  renderEdOverlays();
};

function handleEditorTap(e){
  if(!state.editingOvId) return;
  const rect=$('ed-preview').getBoundingClientRect();
  const x=((e.clientX-rect.left)/rect.width)*100;
  const y=((e.clientY-rect.top)/rect.height)*100;
  state.edDraft.x=x; state.edDraft.y=y;
  state.edOverlays=state.edOverlays.map(o=>o.id===state.editingOvId?{...o,x,y}:o);
  renderEdOverlays();
}

function renderColorRow(){
  $('color-row').innerHTML='';
  TEXT_COLORS.forEach(c=>{
    const d=document.createElement('div');
    d.className='color-dot'+(state.edDraft.color===c?' active':'');
    d.style.background=c;
    d.onclick=()=>{
      state.edDraft.color=c;
      state.edOverlays=state.edOverlays.map(o=>o.id===state.editingOvId?{...o,color:c}:o);
      renderColorRow(); renderEdOverlays();
    };
    $('color-row').appendChild(d);
  });
}

function renderSizeRow(){
  $('size-row').innerHTML='';
  TEXT_SIZES.forEach(s=>{
    const b=document.createElement('button');
    b.className='size-btn'+(state.edDraft.size===s?' active':'');
    b.textContent=s;
    b.onclick=()=>{
      state.edDraft.size=s;
      state.edOverlays=state.edOverlays.map(o=>o.id===state.editingOvId?{...o,size:s}:o);
      renderSizeRow(); renderEdOverlays();
    };
    $('size-row').appendChild(b);
  });
}
